<!doctype html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>OpenClaw 운영 콘솔</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-zinc-950 text-zinc-100">
  <div class="max-w-6xl mx-auto p-6 space-y-6">
    <h1 class="text-3xl font-bold">OpenClaw 운영 콘솔 (KR)</h1>

    <div class="rounded-xl border border-zinc-800 p-4 bg-zinc-900">
      <h2 class="font-bold mb-2">현재 등록 상태 (openclaw.json 실시간)</h2>
      <div id="current" class="text-sm text-zinc-300 mb-3"></div>
      <pre id="currentJson" class="bg-black/40 border border-zinc-800 rounded p-3 text-xs text-zinc-300 overflow-auto max-h-96"></pre>
    </div>

    <div class="rounded-xl border border-zinc-800 p-4 bg-zinc-900 space-y-3">
      <h2 class="font-bold">추가/수정 입력 (에이전트 → 길드 → 채널)</h2>
      <div class="grid md:grid-cols-2 gap-3">
        <input id="discordToken" placeholder="기본 Discord Bot Token (에이전트별 미입력 시 사용)" class="bg-zinc-800 border border-zinc-700 rounded px-3 py-2"/>
        <input id="accountId" value="global-ops" class="bg-zinc-800 border border-zinc-700 rounded px-3 py-2" placeholder="기본 accountId"/>
      </div>

      <div class="flex gap-2">
        <button onclick="addAgentCard()" class="px-3 py-2 bg-indigo-600 rounded">+ 에이전트 추가</button>
        <button onclick="applyConfig()" class="px-3 py-2 bg-emerald-600 rounded">적용</button>
      </div>

      <div id="agents" class="space-y-3"></div>
    </div>

    <pre id="log" class="bg-black/40 border border-zinc-800 rounded p-3 text-xs text-zinc-300"></pre>
  </div>

  <script>
    let state = { models: [] };
    let agentIdSeq = 0;
    let guildIdSeq = 0;
    let channelIdSeq = 0;

    function modelSelect(id) {
      const opts = state.models.map(m => `<option value="${m}">${m}</option>`).join('');
      return `<select id="model-${id}" class="bg-zinc-800 border border-zinc-700 rounded px-2 py-1">${opts}</select>`;
    }

    function addAgentCard(seed = {}) {
      const id = ++agentIdSeq;
      const el = document.createElement('div');
      el.className = 'border border-zinc-700 rounded p-3 space-y-3';
      el.dataset.agentCard = id;

      const policy = {
        requireMention: seed.policy?.requireMention ?? true,
        allowFromBots: seed.policy?.allowFromBots ?? false,
        maxBotTurns: seed.policy?.maxBotTurns ?? 3,
        cooldownSec: seed.policy?.cooldownSec ?? 15,
        loopSensitivity: seed.policy?.loopSensitivity ?? 3,
      };

      el.innerHTML = `
        <div class="grid md:grid-cols-5 gap-2">
          <input id="agent-${id}" class="bg-zinc-800 border border-zinc-700 rounded px-2 py-1" placeholder="agent id (예: cc)" value="${seed.agentId || ''}"/>
          ${modelSelect(id)}
          <input id="account-${id}" class="bg-zinc-800 border border-zinc-700 rounded px-2 py-1" placeholder="accountId" value="${seed.accountId || ''}"/>
          <input id="token-${id}" class="bg-zinc-800 border border-zinc-700 rounded px-2 py-1" placeholder="agent별 token(선택)" value=""/>
          <button onclick="removeAgentCard(${id})" class="bg-zinc-800 border border-zinc-700 rounded px-2 py-1 hover:bg-zinc-700">에이전트 삭제</button>
        </div>

        <div class="grid grid-cols-5 gap-2">
          <select id="rm-${id}" class="bg-zinc-800 border border-zinc-700 rounded px-2 py-1"><option value="true">멘션필수</option><option value="false">멘션불필요</option></select>
          <select id="bf-${id}" class="bg-zinc-800 border border-zinc-700 rounded px-2 py-1"><option value="false">봇대화금지</option><option value="true">봇대화허용</option></select>
          <input id="mt-${id}" type="number" value="${policy.maxBotTurns}" class="bg-zinc-800 border border-zinc-700 rounded px-2 py-1" placeholder="max turns"/>
          <input id="cd-${id}" type="number" value="${policy.cooldownSec}" class="bg-zinc-800 border border-zinc-700 rounded px-2 py-1" placeholder="cooldown"/>
          <input id="ls-${id}" type="number" value="${policy.loopSensitivity}" min="1" max="5" class="bg-zinc-800 border border-zinc-700 rounded px-2 py-1" placeholder="loop"/>
        </div>

        <div class="space-y-2">
          <div class="flex items-center justify-between">
            <div class="text-sm text-zinc-300">길드 목록</div>
            <button onclick="addGuild(${id})" class="px-2 py-1 bg-sky-700 rounded text-sm">+ 길드 추가</button>
          </div>
          <div id="guilds-${id}" class="space-y-2"></div>
        </div>
      `;

      document.getElementById('agents').appendChild(el);
      document.getElementById(`rm-${id}`).value = String(policy.requireMention);
      document.getElementById(`bf-${id}`).value = String(policy.allowFromBots);
      if (seed.model) document.getElementById(`model-${id}`).value = seed.model;

      const guilds = seed.guilds || [];
      if (guilds.length === 0) addGuild(id);
      guilds.forEach(g => addGuild(id, g));
    }

    function removeAgentCard(id) {
      const card = document.querySelector(`[data-agent-card="${id}"]`);
      if (card) card.remove();
    }

    function addGuild(agentCardId, seed = {}) {
      const gid = ++guildIdSeq;
      const container = document.getElementById(`guilds-${agentCardId}`);
      const el = document.createElement('div');
      el.className = 'border border-zinc-800 rounded p-2 space-y-2 bg-zinc-900/50';
      el.dataset.guild = gid;
      el.dataset.agentCard = agentCardId;

      el.innerHTML = `
        <div class="grid md:grid-cols-4 gap-2">
          <input id="guild-id-${gid}" class="bg-zinc-800 border border-zinc-700 rounded px-2 py-1" placeholder="guild id" value="${seed.guildId || ''}"/>
          <div class="md:col-span-3 flex gap-2">
            <button onclick="addChannel(${agentCardId}, ${gid})" class="px-2 py-1 bg-cyan-700 rounded text-sm">+ 채널 추가</button>
            <button onclick="removeGuild(${gid})" class="px-2 py-1 bg-zinc-800 border border-zinc-700 rounded text-sm">길드 삭제</button>
          </div>
        </div>
        <div id="channels-${gid}" class="space-y-2"></div>
      `;

      container.appendChild(el);

      const channels = seed.channels || [];
      if (channels.length === 0) addChannel(agentCardId, gid);
      channels.forEach(c => addChannel(agentCardId, gid, c));
    }

    function removeGuild(gid) {
      const guild = document.querySelector(`[data-guild="${gid}"]`);
      if (guild) guild.remove();
    }

    function addChannel(agentCardId, gid, seed = {}) {
      const cid = ++channelIdSeq;
      const container = document.getElementById(`channels-${gid}`);
      const el = document.createElement('div');
      el.className = 'grid md:grid-cols-4 gap-2';
      el.dataset.channelRow = cid;
      el.dataset.guild = gid;
      el.dataset.agentCard = agentCardId;

      const defaultMention = document.getElementById(`rm-${agentCardId}`)?.value || 'true';
      el.innerHTML = `
        <input id="channel-id-${cid}" class="bg-zinc-800 border border-zinc-700 rounded px-2 py-1" placeholder="channel id" value="${seed.channelId || ''}"/>
        <select id="channel-rm-${cid}" class="bg-zinc-800 border border-zinc-700 rounded px-2 py-1">
          <option value="true">멘션필수</option>
          <option value="false">멘션불필요</option>
        </select>
        <div class="md:col-span-2">
          <button onclick="removeChannel(${cid})" class="px-2 py-1 bg-zinc-800 border border-zinc-700 rounded text-sm">채널 삭제</button>
        </div>
      `;
      container.appendChild(el);
      document.getElementById(`channel-rm-${cid}`).value = String(seed.requireMention ?? (defaultMention === 'true'));
    }

    function removeChannel(cid) {
      const row = document.querySelector(`[data-channel-row="${cid}"]`);
      if (row) row.remove();
    }

    function collectAgents() {
      return [...document.querySelectorAll('[data-agent-card]')].map(card => {
        const id = card.dataset.agentCard;
        const guilds = [...card.querySelectorAll('[data-guild]')].map(g => {
          const gid = g.dataset.guild;
          return {
            guildId: document.getElementById(`guild-id-${gid}`).value.trim(),
            channels: [...g.querySelectorAll('[data-channel-row]')].map(ch => {
              const cid = ch.dataset.channelRow;
              return {
                channelId: document.getElementById(`channel-id-${cid}`).value.trim(),
                requireMention: document.getElementById(`channel-rm-${cid}`).value === 'true',
              };
            }).filter(ch => ch.channelId),
          };
        }).filter(g => g.guildId && g.channels.length > 0);

        return {
          agentId: document.getElementById(`agent-${id}`).value.trim(),
          model: document.getElementById(`model-${id}`).value.trim(),
          accountId: document.getElementById(`account-${id}`).value.trim(),
          token: document.getElementById(`token-${id}`).value.trim(),
          policy: {
            requireMention: document.getElementById(`rm-${id}`).value === 'true',
            allowFromBots: document.getElementById(`bf-${id}`).value === 'true',
            maxBotTurns: Number(document.getElementById(`mt-${id}`).value || 3),
            cooldownSec: Number(document.getElementById(`cd-${id}`).value || 15),
            loopSensitivity: Number(document.getElementById(`ls-${id}`).value || 3)
          },
          guilds,
        };
      }).filter(a => a.agentId && a.model && a.guilds.length > 0);
    }

    async function loadState() {
      const r = await fetch('/api/state');
      const j = await r.json();
      state = j;

      const channelCount = (j.agentRoutes || []).reduce((acc, a) => acc + (a.channels?.length || 0), 0);
      document.getElementById('current').innerHTML = `
        <p>등록 에이전트: <b>${j.agents.map(a => a.id).join(', ')}</b></p>
        <p>등록 모델: <b>${j.models.join(', ')}</b></p>
        <p>에이전트 라우트 수: <b>${(j.agentRoutes || []).length}</b> / 채널 수: <b>${channelCount}</b></p>
      `;
      document.getElementById('currentJson').textContent = JSON.stringify(j.config || {}, null, 2);

      document.getElementById('agents').innerHTML = '';
      agentIdSeq = 0;

      const routes = (j.agentRoutes || []).sort((a, b) => a.agentId.localeCompare(b.agentId));
      routes.forEach(route => addAgentCard(route));
      if (routes.length === 0) addAgentCard({});
    }

    async function applyConfig() {
      const payload = {
        discordToken: document.getElementById('discordToken').value.trim(),
        accountId: document.getElementById('accountId').value.trim() || 'global-ops',
        agents: collectAgents()
      };

      const r = await fetch('/api/apply', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify(payload)
      });
      const j = await r.json();
      document.getElementById('log').textContent = JSON.stringify(j, null, 2);
      if (j.ok) await loadState();
    }

    loadState();
  </script>
</body>
</html>
